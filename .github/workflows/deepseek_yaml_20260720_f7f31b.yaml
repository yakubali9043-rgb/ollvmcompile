name: Cross-Compile OLLVM for Windows NDK r27d

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      clean_cache:
        description: 'Clean cache before build'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    env:
      NDK_VERSION: r27d
      LLVM_VERSION: 17.0.6
      OLLVM_REPO: DreamSoule
      NODE_OPTIONS: --no-deprecation
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner: ${{ runner.os }}"
          echo "Arch: ${{ runner.arch }}"
          echo "Free disk space:"
          df -h /

      - name: Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          rm -rf llvm-project
          rm -rf llvm-project-build
          rm -rf ndk_windows
          rm -rf ~/.cache/ccache

      - name: Install cross-compilation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            g++-mingw-w64-x86-64 \
            mingw-w64-tools \
            cmake \
            ninja-build \
            pkg-config \
            dos2unix \
            python3

      - name: Download LLVM 17.0.6 official source
        run: |
          echo "📌 Downloading LLVM 17.0.6 official source..."
          curl -L -o llvm-17.0.6.src.tar.xz https://github.com/llvm/llvm-project/releases/download/llvmorg-17.0.6/llvm-project-17.0.6.src.tar.xz
          tar -xf llvm-17.0.6.src.tar.xz
          mv llvm-project-17.0.6.src llvm-project
          echo "✅ LLVM 17.0.6 source downloaded"

      - name: Download DreamSoule OLLVM17 patches
        run: |
          echo "📌 Downloading DreamSoule OLLVM17 patches..."
          cd llvm-project
          git clone --depth 1 https://github.com/DreamSoule/ollvm17.git ollvm-patches
          
          # According to DreamSoule instructions, replace files in official source
          echo "📌 Replacing files with OLLVM17 versions..."
          
          # Copy Obfuscation directory to LLVM
          if [ -d "ollvm-patches/llvm/lib/Transforms/Obfuscation" ]; then
            cp -r ollvm-patches/llvm/lib/Transforms/Obfuscation llvm/lib/Transforms/
            echo "✅ Obfuscation passes copied"
          else
            echo "⚠️ Obfuscation directory not found in patches"
          fi
          
          # Copy include files if needed
          if [ -d "ollvm-patches/llvm/include/llvm/Transforms/Obfuscation" ]; then
            cp -r ollvm-patches/llvm/include/llvm/Transforms/Obfuscation llvm/include/llvm/Transforms/
            echo "✅ Obfuscation headers copied"
          fi
          
          # Apply patch files if they exist (alternative method)
          if [ -d "ollvm-patches/patches" ]; then
            echo "📌 Applying patch files..."
            cd llvm
            for patch in ../ollvm-patches/patches/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying patch: $(basename $patch)"
                patch -p1 -f --forward < "$patch" 2>&1 || echo "⚠️ Patch may already be applied"
              fi
            done
            cd ..
          fi
          
          echo "✅ DreamSoule OLLVM17 integration complete"
          cd ..

      - name: Fix CMake add_custom_command error (CMP0175)
        run: |
          FILE="llvm-project/clang/lib/Tooling/CMakeLists.txt"
          echo "🔧 Fixing CMakeLists.txt for CMake 3.29+ compatibility..."
          
          # Create backup
          cp $FILE $FILE.bak
          
          # Fix using Python for robust editing
          python3 << 'PYTHON_SCRIPT'
          import re
          
          file_path = "llvm-project/clang/lib/Tooling/CMakeLists.txt"
          
          with open(file_path, 'r') as f:
              content = f.read()
          
          # Fix the add_custom_command syntax
          pattern = r'(add_custom_command\s*\([\s\S]*?OUTPUT\s*[\s\S]*?clang-targets\.inc[\s\S]*?COMMAND\s*[\s\S]*?COMMENT\s*"Generating target descriptions\."[\s\S]*?\))'
          
          corrected = '''add_custom_command(
            OUTPUT ${CMAKE_CURRENT_BINARY_DIR}/clang-targets.inc
            DEPENDS ${CMAKE_CURRENT_SOURCE_DIR}/../../
            COMMAND ${CMAKE_COMMAND} -E echo "Generating target descriptions..."
            COMMENT "Generating target descriptions..."
          )'''
          
          content = re.sub(pattern, corrected, content, flags=re.DOTALL)
          
          # If pattern didn't match, try simpler approach
          if "clang-targets.inc" in content and "COMMENT" in content:
              lines = content.split('\n')
              new_lines = []
              in_target_block = False
              
              for i, line in enumerate(lines):
                  if 'add_custom_command' in line and 'clang-targets.inc' in content[content.find(line):content.find(line)+500]:
                      in_target_block = True
                      # Skip to the end of the block
                      continue
                  
                  if in_target_block:
                      if ')' in line:
                          # Add corrected block
                          new_lines.extend([
                              'add_custom_command(',
                              '  OUTPUT ${CMAKE_CURRENT_BINARY_DIR}/clang-targets.inc',
                              '  DEPENDS ${CMAKE_CURRENT_SOURCE_DIR}/../../',
                              '  COMMAND ${CMAKE_COMMAND} -E echo "Generating target descriptions..."',
                              '  COMMENT "Generating target descriptions..."',
                              ')'
                          ])
                          in_target_block = False
                      continue
                  
                  if not in_target_block:
                      new_lines.append(line)
              
              content = '\n'.join(new_lines)
          
          with open(file_path, 'w') as f:
              f.write(content)
          
          print("✅ CMakeLists.txt fixed successfully")
          PYTHON_SCRIPT
          
          echo "✅ CMake fix applied"

      - name: Cache LLVM build directories
        uses: actions/cache@v4
        with:
          path: |
            llvm-project/build-tblgen
            llvm-project/build-windows
            llvm-project/ollvm-patches
            ~/.cache/ccache
          key: ${{ runner.os }}-ollvm-windows-${{ env.LLVM_VERSION }}-${{ hashFiles('llvm-project/llvm/CMakeLists.txt', 'llvm-project/llvm/tools/clang/CMakeLists.txt', 'llvm-project/llvm/tools/lld/CMakeLists.txt', 'llvm-project/llvm/lib/Transforms/Obfuscation/**/*.cpp', 'llvm-project/ollvm-patches/**/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-ollvm-windows-${{ env.LLVM_VERSION }}-
            ${{ runner.os }}-ollvm-windows-

      - name: Build Linux llvm-tblgen (required for cross-compilation)
        run: |
          mkdir -p llvm-project/build-tblgen
          cd llvm-project/build-tblgen
          
          echo "📌 Building host tools (llvm-tblgen, clang-tblgen)..."
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0114=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0116=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0175=NEW \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DCLANG_BUILD_TOOLS=ON \
            -DLLVM_USE_SANITIZER= \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            ../llvm
          
          ninja -j "$(nproc)" llvm-tblgen clang-tblgen
          
          echo "✅ Host tools built successfully"

      - name: Cross-compile OLLVM for Windows (clang.exe, lld.exe)
        run: |
          mkdir -p llvm-project/build-windows
          cd llvm-project/build-windows
          
          echo "📌 Cross-compiling OLLVM for Windows..."
          
          # Verify tablegen tools exist
          if [ ! -f "../build-tblgen/bin/llvm-tblgen" ]; then
            echo "❌ llvm-tblgen not found!"
            exit 1
          fi
          
          if [ ! -f "../build-tblgen/bin/clang-tblgen" ]; then
            echo "❌ clang-tblgen not found!"
            exit 1
          fi
          
          # Configure for Windows cross-compilation
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0114=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0116=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0175=NEW \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_SYSTEM_VERSION=10.0 \
            -DCMAKE_SYSTEM_PROCESSOR=x86_64 \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DCLANG_BUILD_TOOLS=ON \
            -DLLVM_USE_SANITIZER= \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_TABLEGEN=$(pwd)/../build-tblgen/bin/llvm-tblgen \
            -DCLANG_TABLEGEN=$(pwd)/../build-tblgen/bin/clang-tblgen \
            ../llvm
          
          if [ $? -ne 0 ]; then
            echo "❌ CMake configuration failed!"
            exit 1
          fi
          
          # Build only clang and lld
          ninja -j "$(nproc)" clang lld
          
          if [ $? -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          fi
          
          echo "✅ Cross-compilation completed successfully"
          
          # Verify the output
          echo "📌 Built binaries:"
          ls -la bin/*.exe 2>/dev/null || echo "No .exe files found"

      - name: Download Android NDK r27d (Windows)
        run: |
          echo "📌 Downloading Android NDK r27d Windows..."
          curl -L -o android-ndk-${{ env.NDK_VERSION }}-windows.zip https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-windows.zip
          if [ $? -ne 0 ]; then
            echo "❌ Failed to download NDK"
            exit 1
          fi
          unzip -q android-ndk-${{ env.NDK_VERSION }}-windows.zip -d ndk_windows
          echo "✅ NDK downloaded and extracted"

      - name: Replace Windows NDK clang binaries with cross-compiled OLLVM
        run: |
          install_dir=ndk_windows/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/windows-x86_64/bin
          build_bin=llvm-project/build-windows/bin
          
          echo "📌 Installing OLLVM binaries to NDK..."
          
          # Create backup of original binaries
          mkdir -p "$install_dir/backup"
          cp -f "$install_dir/clang.exe" "$install_dir/backup/clang.original.exe" 2>/dev/null || echo "Original clang.exe not found"
          cp -f "$install_dir/clang++.exe" "$install_dir/backup/clang++.original.exe" 2>/dev/null || echo "Original clang++.exe not found"
          cp -f "$install_dir/lld.exe" "$install_dir/backup/lld.original.exe" 2>/dev/null || echo "Original lld.exe not found"
          
          # Install cross-compiled OLLVM binaries (.exe)
          if [ -f "$build_bin/clang.exe" ]; then
            cp -f "$build_bin/clang.exe" "$install_dir/"
            echo "✅ clang.exe installed"
          else
            echo "❌ clang.exe not found in build output"
            exit 1
          fi
          
          if [ -f "$build_bin/clang++.exe" ]; then
            cp -f "$build_bin/clang++.exe" "$install_dir/"
            echo "✅ clang++.exe installed"
          else
            echo "❌ clang++.exe not found in build output"
            exit 1
          fi
          
          # Copy lld if available
          if [ -f "$build_bin/lld.exe" ]; then
            cp -f "$build_bin/lld.exe" "$install_dir/"
            echo "✅ lld.exe installed"
          else
            echo "⚠️ lld.exe not found - skipping"
          fi
          
          if [ -f "$build_bin/ld.lld.exe" ]; then
            cp -f "$build_bin/ld.lld.exe" "$install_dir/"
            echo "✅ ld.lld.exe installed"
          fi
          
          if [ -f "$build_bin/lld-link.exe" ]; then
            cp -f "$build_bin/lld-link.exe" "$install_dir/"
            echo "✅ lld-link.exe installed"
          fi
          
          # Create versioned copies for compatibility
          cd "$install_dir"
          cp -f clang.exe "clang-17.exe"
          cp -f clang++.exe "clang++-17.exe"
          cp -f clang.exe "clang-${{ env.LLVM_VERSION }}.exe" 2>/dev/null || true
          cp -f clang++.exe "clang++-${{ env.LLVM_VERSION }}.exe" 2>/dev/null || true
          
          echo "✅ Windows NDK binaries replaced with cross-compiled OLLVM"
          
          # Show installed files
          echo "📌 Installed binaries:"
          ls -la "$install_dir" | grep -E "clang|lld" || echo "No binaries found"

      - name: Verify Windows OLLVM binaries
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     Windows OLLVM Binary Verification                        ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          install_dir=ndk_windows/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/windows-x86_64/bin
          
          # Check if Windows binaries exist
          echo "📌 Checking Windows binaries:"
          ls -la "$install_dir"/*.exe 2>/dev/null | head -10 || echo "No .exe files found"
          echo ""
          
          # Check file types (should show PE32+ executable for Windows)
          echo "📌 Checking binary file types (should be Windows PE executables):"
          if [ -f "$install_dir/clang.exe" ]; then
            file "$install_dir/clang.exe"
          else
            echo "❌ clang.exe not found!"
          fi
          
          if [ -f "$install_dir/clang++.exe" ]; then
            file "$install_dir/clang++.exe"
          else
            echo "❌ clang++.exe not found!"
          fi
          
          if [ -f "$install_dir/lld.exe" ]; then
            file "$install_dir/lld.exe"
          else
            echo "⚠️ lld.exe not found"
          fi
          echo ""
          
          # Check binary sizes
          echo "📌 Binary sizes:"
          if [ -f "$install_dir/clang.exe" ]; then
            du -h "$install_dir/clang.exe"
          fi
          if [ -f "$install_dir/clang++.exe" ]; then
            du -h "$install_dir/clang++.exe"
          fi
          if [ -f "$install_dir/lld.exe" ]; then
            du -h "$install_dir/lld.exe"
          fi

      - name: Create Windows NDK documentation with all OLLVM passes
        run: |
          ndk_dir=ndk_windows/android-ndk-${{ env.NDK_VERSION }}
          
          # Create version info for Windows with all DreamSoule OLLVM17 passes
          cat > "$ndk_dir/VERSION.txt" << 'EOF'
          ╔══════════════════════════════════════════════════════════════════╗
          ║     Android NDK with DreamSoule OLLVM17                        ║
          ║     Windows Version - Cross-Compiled                          ║
          ╚══════════════════════════════════════════════════════════════════╝
          
          NDK Version: r27d (LTS)
          LLVM Version: 17.0.6
          OLLVM Source: https://github.com/DreamSoule/ollvm17
          Platform: Windows x86_64
          
          ────────────────────────────────────────────────────────────────────
          ALL OBFUSCATION PASSES:
          ────────────────────────────────────────────────────────────────────
          
          ✓ -fla           : Control Flow Flattening
          ✓ -bcf           : Bogus Control Flow
            - bcf_prob=N   : Probability 1~100 (default: 70)
            - bcf_loop=N   : Repeat count (default: 2)
          ✓ -sub           : Instruction Substitution (add/and/sub/or/xor)
            - sub_loop=N   : Substitution times (default: 1)
          ✓ -sobf          : String Obfuscation (narrow characters only)
          ✓ -split         : Basic Block Splitting
            - split_num=N  : Number of split blocks (default: 3)
          ✓ -ibr           : Indirect Branch
          ✓ -icall         : Indirect Call (call register)
          ✓ -igv           : Indirect Global Variables
          ✓ -fncmd         : Function name control obfuscation
          
          ────────────────────────────────────────────────────────────────────
          FULL FEATURES EXAMPLE:
          ────────────────────────────────────────────────────────────────────
          
          -mllvm -fla -mllvm -bcf -mllvm -bcf_prob=80 -mllvm -bcf_loop=3 
          -mllvm -sobf -mllvm -icall -mllvm -ibr -mllvm -igv 
          -mllvm -sub -mllvm -sub_loop=3 -mllvm -split -mllvm -split_num=5
          
          ────────────────────────────────────────────────────────────────────
          ANNOTATION SUPPORT (per-function control):
          ────────────────────────────────────────────────────────────────────
          
          // Enable specific passes for a function
          __attribute__((annotate("fla bcf igv ibr icall sub split")))
          int myFunction() {
              return 0;
          }
          
          // Disable specific passes
          __attribute__((annotate("nofla nobcf nosplit")))
          int myFunction2() {
              return 0;
          }
          
          ────────────────────────────────────────────────────────────────────
          INCLUDED EXECUTABLES:
          ────────────────────────────────────────────────────────────────────
          
          ✅ clang.exe        - OLLVM compiler
          ✅ clang++.exe      - OLLVM C++ compiler
          ✅ lld.exe          - LLD linker
          ✅ clang-17.exe     - Versioned compiler
          ✅ clang++-17.exe   - Versioned C++ compiler
          
          ────────────────────────────────────────────────────────────────────
          SETUP INSTRUCTIONS:
          ────────────────────────────────────────────────────────────────────
          
          1. Extract this zip file to your desired location
          2. Set ANDROID_NDK_HOME to the extracted directory
          3. Add to PATH: %ANDROID_NDK_HOME%\toolchains\llvm\prebuilt\windows-x86_64\bin
          4. Use clang.exe with OLLVM flags
          
          ────────────────────────────────────────────────────────────────────
          USAGE EXAMPLES:
          ────────────────────────────────────────────────────────────────────
          
          # Single pass
          clang -mllvm -fla source.c -o output
          
          # Multiple passes
          clang -mllvm -fla -mllvm -bcf -mllvm -sub source.c -o output
          
          # Full obfuscation
          clang -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf -mllvm -split -mllvm -ibr -mllvm -icall -mllvm -igv source.c -o output
          
          # With parameters
          clang -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=80 -mllvm -sub_loop=3 -mllvm -split_num=5 source.c -o output
          
          # Android target
          clang -target aarch64-linux-android -mllvm -fla -mllvm -bcf source.c -o output
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  For more info: https://github.com/DreamSoule/ollvm17          ║
          ║  Built with GitHub Actions - Cross-Compiled for Windows        ║
          ╚══════════════════════════════════════════════════════════════════╝
          EOF
          
          # Create a batch file for Windows setup with all pass information
          cat > "$ndk_dir/setup_ollvm.bat" << 'EOF'
          @echo off
          echo =========================================
          echo OLLVM NDK r27d - Windows Setup
          echo DreamSoule OLLVM17 - All Features
          echo =========================================
          echo.
          set "NDK_DIR=%~dp0"
          set "ANDROID_NDK_HOME=%NDK_DIR%"
          set "PATH=%NDK_DIR%toolchains\llvm\prebuilt\windows-x86_64\bin;%PATH%"
          echo ✅ Environment variables set:
          echo ANDROID_NDK_HOME=%ANDROID_NDK_HOME%
          echo PATH updated with OLLVM binaries
          echo.
          echo =========================================
          echo AVAILABLE OLLVM PASSES:
          echo =========================================
          echo   -fla    : Control Flow Flattening
          echo   -bcf    : Bogus Control Flow
          echo     bcf_prob=N  : Probability 1~100 (default: 70)
          echo     bcf_loop=N  : Repeat count (default: 2)
          echo   -sub    : Instruction Substitution
          echo     sub_loop=N  : Substitution times (default: 1)
          echo   -sobf   : String Obfuscation
          echo   -split  : Basic Block Splitting
          echo     split_num=N : Number of split blocks (default: 3)
          echo   -ibr    : Indirect Branch
          echo   -icall  : Indirect Call
          echo   -igv    : Indirect Global Variables
          echo   -fncmd  : Function name control
          echo.
          echo =========================================
          echo FULL OBFUSCATION EXAMPLE:
          echo =========================================
          echo clang -mllvm -fla -mllvm -bcf -mllvm -bcf_prob=80 -mllvm -bcf_loop=3 -mllvm -sobf -mllvm -icall -mllvm -ibr -mllvm -igv -mllvm -sub -mllvm -sub_loop=3 -mllvm -split -mllvm -split_num=5 source.c -o output
          echo.
          echo =========================================
          echo ANNOTATION SUPPORT (per-function):
          echo =========================================
          echo __attribute__((annotate("fla bcf igv ibr icall sub split")))
          echo __attribute__((annotate("nofla nobcf nosplit")))
          echo.
          echo =========================================
          EOF

      - name: Package Windows NDK with OLLVM
        run: |
          cd ndk_windows
          zip -r ../android-ndk-${{ env.NDK_VERSION }}-ollvm-windows.zip android-ndk-${{ env.NDK_VERSION }} \
            -x "*/backup/*" \
            -x "*/windows-x86_64/libexec/*" \
            -x "*/windows-x86_64/share/*"
          
          echo "✅ Package created: android-ndk-${{ env.NDK_VERSION }}-ollvm-windows.zip"
          ls -lh ../android-ndk-${{ env.NDK_VERSION }}-ollvm-windows.zip

      - name: Upload Windows NDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-${{ env.NDK_VERSION }}-ollvm-windows
          path: android-ndk-${{ env.NDK_VERSION }}-ollvm-windows.zip
          retention-days: 90

      - name: Generate build summary
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗" >> $GITHUB_STEP_SUMMARY
          echo "║  ✅ DreamSoule OLLVM17 Windows Cross-Compilation Complete    ║" >> $GITHUB_STEP_SUMMARY
          echo "╚════════════════════════════════════════════════════════════════╝" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📦 Package Details" >> $GITHUB_STEP_SUMMARY
          echo "- **NDK Version:** ${{ env.NDK_VERSION }} (LTS)" >> $GITHUB_STEP_SUMMARY
          echo "- **LLVM Version:** ${{ env.LLVM_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OLLVM Source:** [DreamSoule/ollvm17](https://github.com/DreamSoule/ollvm17) ⭐⭐⭐⭐⭐" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** Windows x86_64 (cross-compiled)" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`android-ndk-${{ env.NDK_VERSION }}-ollvm-windows.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** 90 days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 🛡️ All DreamSoule OLLVM17 Passes" >> $GITHUB_STEP_SUMMARY
          echo "| Pass | Description | Flag | Parameters |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Control Flow Flattening** | Flattens control flow graph | \`-mllvm -fla\` | - |" >> $GITHUB_STEP_SUMMARY
