name: Build OLLVM LLVM/Clang for Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      clean_cache:
        description: 'Clean cache before build'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r26d
      NDK_VERSION_SHORT: r26
      LLVM_VERSION: 17.0.0
      OLLVM_REPO: DreamSoule
      NODE_OPTIONS: --no-deprecation
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner: ${{ runner.os }}"
          echo "Arch: ${{ runner.arch }}"
          echo "Free disk space:"
          df -h /

      - name: Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          rm -rf llvm-project/build
          rm -rf ndk
          rm -rf ~/.cache/ccache

      - name: Ensure llvm-project source is present
        run: |
          if [ ! -d llvm-project ]; then
            git clone --depth 1 --branch llvmorg-17.0.0 https://github.com/llvm/llvm-project.git llvm-project
          fi

      - name: Apply DreamSoule OLLVM17 patches
        run: |
          cd llvm-project
          
          # Clone DreamSoule OLLVM17 patches
          git clone --depth 1 https://github.com/DreamSoule/ollvm17.git ollvm-patches
          
          # Apply patches with retry logic
          cd llvm
          success_count=0
          fail_count=0
          
          for patch in ../ollvm-patches/patches/*.patch; do
            if [ -f "$patch" ]; then
              echo "Applying patch: $(basename $patch)"
              if patch -p1 -f --forward < "$patch" 2>&1; then
                echo "✅ $(basename $patch) applied successfully"
                ((success_count++))
              else
                echo "⚠️ $(basename $patch) failed, checking if already applied..."
                if patch -p1 -R --dry-run < "$patch" 2>&1 > /dev/null; then
                  echo "✅ $(basename $patch) already applied"
                  ((success_count++))
                else
                  echo "❌ $(basename $patch) failed - skipping"
                  ((fail_count++))
                fi
              fi
            fi
          done
          
          echo "📊 Patch Summary: $success_count applied, $fail_count failed"
          cd ../..

      - name: Cache LLVM build directory
        uses: actions/cache@v4
        with:
          path: |
            llvm-project/build
            llvm-project/ollvm-patches
            ~/.cache/ccache
          key: ${{ runner.os }}-ollvm-${{ env.LLVM_VERSION }}-${{ hashFiles('llvm-project/llvm/CMakeLists.txt', 'llvm-project/llvm/tools/clang/CMakeLists.txt', 'llvm-project/llvm/tools/lld/CMakeLists.txt', 'llvm-project/ollvm-patches/patches/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-ollvm-${{ env.LLVM_VERSION }}-
            ${{ runner.os }}-ollvm-

      - name: Configure LLVM/Clang with OLLVM
        run: |
          mkdir -p llvm-project/build
          cd llvm-project/build
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_DEFAULT_CMP0114=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0116=NEW \
            -DCMAKE_POLICY_DEFAULT_CMP0175=NEW \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DCLANG_BUILD_TOOLS=ON \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_USE_SANITIZER= \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            -DLLVM_OPTIMIZED_TABLEGEN=ON \
            -DLLVM_CCACHE_BUILD=OFF \
            ../llvm

      - name: Build OLLVM clang and lld
        run: |
          cd llvm-project/build
          ninja -j "$(nproc)" clang lld

      - name: Download Android NDK ${{ env.NDK_VERSION }} (LTS)
        run: |
          curl -L -o android-ndk-${{ env.NDK_VERSION }}-linux.zip https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip -d ndk

      - name: Replace NDK clang binaries with OLLVM
        run: |
          install_dir=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          build_bin=llvm-project/build/bin
          
          # Create backup of original binaries
          mkdir -p "$install_dir/backup"
          cp -f "$install_dir/clang" "$install_dir/backup/clang.original" 2>/dev/null || true
          cp -f "$install_dir/clang++" "$install_dir/backup/clang++.original" 2>/dev/null || true
          
          # Install OLLVM binaries with proper permissions
          cp -f "$build_bin/clang" "$install_dir/"
          cp -f "$build_bin/clang++" "$install_dir/"
          
          # Set executable permissions
          chmod +x "$install_dir/clang"
          chmod +x "$install_dir/clang++"
          
          # Copy lld to NDK
          cp -f "$build_bin/lld" "$install_dir/"
          cp -f "$build_bin/ld.lld" "$install_dir/" 2>/dev/null || ln -sf lld "$install_dir/ld.lld"
          chmod +x "$install_dir/lld" 2>/dev/null || true
          chmod +x "$install_dir/ld.lld" 2>/dev/null || true
          
          # Create versioned symlinks for compatibility
          cd "$install_dir"
          for version in 17; do
            if [ -f "clang-$version" ] || [ -L "clang-$version" ]; then
              rm -f "clang-$version"
            fi
            ln -sf clang "clang-$version"
            
            if [ -f "clang++-$version" ] || [ -L "clang++-$version" ]; then
              rm -f "clang++-$version"
            fi
            ln -sf clang++ "clang++-$version"
          done
          
          ln -sf clang "clang-17" 2>/dev/null || true
          ln -sf clang++ "clang++-17" 2>/dev/null || true
          
          # Verify permissions
          echo "🔍 Checking binary permissions:"
          ls -la "$install_dir/clang" "$install_dir/clang++"

      - name: Test OLLVM clang functionality
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     OLLVM Clang Functionality Test                           ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Test basic compilation first
          echo "📌 Testing basic compilation:"
          echo 'int main() { return 0; }' > test_basic.c
          "$ndk_bin/clang" test_basic.c -o test_basic
          if [ $? -eq 0 ]; then
            echo "✅ Basic compilation: SUCCESS"
          else
            echo "❌ Basic compilation: FAILED"
            exit 1
          fi
          echo ""

      - name: Verify OLLVM obfuscation passes
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     DreamSoule OLLVM17 - Obfuscation Passes Test Suite       ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Create test source
          cat > test_source.c << 'EOF'
          #include <stdio.h>
          #include <string.h>
          
          int main(int argc, char** argv) {
              const char* secret = "Hello OLLVM World";
              char buffer[100];
              strcpy(buffer, secret);
              printf("%s\n", buffer);
              
              int sum = 0;
              for(int i = 0; i < 100; i++) {
                  sum += i;
                  if (sum > 1000) break;
              }
              return sum;
          }
          EOF
          
          # Function to test OLLVM passes
          test_pass() {
              local pass_name=$1
              local pass_flag=$2
              local extra_flags=$3
              
              echo "─────────────────────────────────────────────────────────────────"
              echo "🧪 Testing: $pass_name"
              echo "   Flag: $pass_flag"
              
              if [ -n "$extra_flags" ]; then
                  output=$("$ndk_bin/clang" $pass_flag $extra_flags test_source.c -o test_${pass_name// /_} 2>&1)
                  exit_code=$?
              else
                  output=$("$ndk_bin/clang" $pass_flag test_source.c -o test_${pass_name// /_} 2>&1)
                  exit_code=$?
              fi
              
              if [ $exit_code -eq 0 ]; then
                  echo "   ✅ $pass_name: SUCCESS"
              else
                  echo "   ❌ $pass_name: FAILED (exit code: $exit_code)"
                  echo "   Error: $output"
              fi
              echo ""
              return $exit_code
          }
          
          # Test each pass individually
          test_pass "Control Flow Flattening" "-mllvm -fla"
          test_pass "Bogus Control Flow" "-mllvm -bcf"
          test_pass "Bogus CF with Loop" "-mllvm -bcf" "-mllvm -bcf_loop=3"
          test_pass "Bogus CF with Prob" "-mllvm -bcf" "-mllvm -bcf_prob=40"
          test_pass "Instruction Substitution" "-mllvm -sub"
          test_pass "String Obfuscation" "-mllvm -sobf"
          test_pass "Basic Block Splitting" "-mllvm -split"
          test_pass "Split with Num" "-mllvm -split" "-mllvm -split_num=3"
          test_pass "Indirect Branch" "-mllvm -ibr"
          test_pass "Indirect Call" "-mllvm -icall"
          test_pass "Indirect Global Variables" "-mllvm -igv"
          
          # Test combined passes
          echo "─────────────────────────────────────────────────────────────────"
          echo "🧪 Testing: Combined Obfuscation Passes"
          output=$("$ndk_bin/clang" -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf test_source.c -o test_combined 2>&1)
          if [ $? -eq 0 ]; then
              echo "   ✅ Combined passes: SUCCESS"
          else
              echo "   ⚠️ Combined passes may need adjustment"
              echo "   Output: $output"
          fi
          echo ""

      - name: Check available OLLVM passes
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     OLLVM Pass Availability Check                             ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Check if OLLVM passes are available by looking at --help output
          echo "🔍 Checking OLLVM passes via clang --help:"
          "$ndk_bin/clang" --help | grep -E "(fla|bcf|sub|sobf|split|ibr|icall|igv)" || echo "No OLLVM passes found in --help"
          echo ""
          
          # Alternative: Check if passes are compiled in
          echo "🔍 Checking for OLLVM obfuscation passes:"
          echo ""

      - name: Print OLLVM compiler version
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     OLLVM Build Information                                   ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📌 COMPILER VERSION:"
          echo "─────────────────────────────────────────────────────────────────"
          "$ndk_bin/clang" --version
          echo ""
          echo "📌 NDK INFORMATION:"
          echo "─────────────────────────────────────────────────────────────────"
          echo "  NDK Version    : ${{ env.NDK_VERSION }} (LTS)"
          echo "  LLVM Version   : ${{ env.LLVM_VERSION }} with OLLVM"
          echo "  Architectures  : AArch64, ARM, X86"
          echo ""

      - name: Create NDK directory structure for Windows compatibility
        run: |
          ndk_dir=ndk/android-ndk-${{ env.NDK_VERSION }}
          
          # Create Windows compatibility
          if [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64" ]; then
            mkdir -p "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64/bin"
            echo "NDK ${{ env.NDK_VERSION }} with OLLVM - Windows" > "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64/README.md"
          fi
          
          # Create version info
          cat > "$ndk_dir/VERSION.txt" << 'EOF'
          ╔══════════════════════════════════════════════════════════════════╗
          ║     Android NDK with OLLVM17                                   ║
          ╚══════════════════════════════════════════════════════════════════╝
          
          NDK Version: r26d (LTS)
          LLVM Version: 17.0.0
          
          OBFUSCATION PASSES (if available):
          - Control Flow Flattening    : -mllvm -fla
          - Bogus Control Flow         : -mllvm -bcf
          - Instruction Substitution   : -mllvm -sub
          - String Obfuscation         : -mllvm -sobf
          - Basic Block Splitting      : -mllvm -split
          - Indirect Branch            : -mllvm -ibr
          - Indirect Call              : -mllvm -icall
          - Indirect Global Variables  : -mllvm -igv
          
          USAGE:
          clang -mllvm -fla -mllvm -bcf source.c -o output
          EOF

      - name: Package modified Android NDK with OLLVM
        run: |
          cd ndk
          zip -r ../android-ndk-${{ env.NDK_VERSION }}-ollvm.zip android-ndk-${{ env.NDK_VERSION }} \
            -x "*/backup/*" \
            -x "*/test_*" \
            -x "*/linux-x86_64/libexec/*" \
            -x "*/linux-x86_64/share/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-${{ env.NDK_VERSION }}-ollvm
          path: android-ndk-${{ env.NDK_VERSION }}-ollvm.zip
          retention-days: 90

      - name: Generate build summary
        run: |
          echo "## ✅ OLLVM Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Package Details" >> $GITHUB_STEP_SUMMARY
          echo "- **NDK Version:** ${{ env.NDK_VERSION }} (LTS)" >> $GITHUB_STEP_SUMMARY
          echo "- **LLVM Version:** ${{ env.LLVM_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OLLVM Source:** DreamSoule/ollvm17" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`android-ndk-${{ env.NDK_VERSION }}-ollvm.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** 90 days" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🛡️ Obfuscation Passes" >> $GITHUB_STEP_SUMMARY
          echo "| Pass | Description | Flag |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Control Flow Flattening** | Flattens control flow | \`-mllvm -fla\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bogus Control Flow** | Adds fake paths | \`-mllvm -bcf\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Instruction Substitution** | Replaces instructions | \`-mllvm -sub\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **String Obfuscation** | Encrypts strings | \`-mllvm -sobf\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Basic Block Splitting** | Splits blocks | \`-mllvm -split\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Branch** | Obfuscates branches | \`-mllvm -ibr\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Call** | Obfuscates calls | \`-mllvm -icall\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Global Variables** | Obfuscates globals | \`-mllvm -igv\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📝 Usage Example" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Single pass' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -fla source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Multiple passes' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -fla -mllvm -bcf -mllvm -sub source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Android target' >> $GITHUB_STEP_SUMMARY
          echo 'clang -target aarch64-linux-android -mllvm -fla source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
