name: Build OLLVM LLVM/Clang for Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      clean_cache:
        description: 'Clean cache before build'
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: r26d
      NDK_VERSION_SHORT: r26
      LLVM_VERSION: 17.0.0
      OLLVM_REPO: DreamSoule
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean cache (if requested)
        if: github.event.inputs.clean_cache == 'true'
        run: |
          rm -rf llvm-project/build
          rm -rf ndk

      - name: Ensure llvm-project source is present
        run: |
          if [ ! -d llvm-project ]; then
            git clone --depth 1 --branch llvmorg-17.0.0 https://github.com/llvm/llvm-project.git llvm-project
          fi

      - name: Apply DreamSoule OLLVM17 patches (All obfuscation passes)
        run: |
          cd llvm-project
          # Clone DreamSoule OLLVM17 patches
          git clone --depth 1 https://github.com/DreamSoule/ollvm17.git ollvm-patches
          
          # Apply all patches to LLVM source
          cd llvm
          if [ -d "../ollvm-patches/patches" ]; then
            for patch in ../ollvm-patches/patches/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying patch: $(basename $patch)"
                patch -p1 < "$patch" || echo "⚠️ Patch may already be applied"
              fi
            done
          fi
          
          # Verify OLLVM passes are applied
          echo "✅ DreamSoule OLLVM17 patches applied"
          cd ../..

      - name: Cache LLVM build directory
        uses: actions/cache@v4
        with:
          path: |
            llvm-project/build
            llvm-project/ollvm-patches
          key: ${{ runner.os }}-ollvm-${{ env.LLVM_VERSION }}-${{ hashFiles('llvm-project/llvm/CMakeLists.txt', 'llvm-project/llvm/tools/clang/CMakeLists.txt', 'llvm-project/llvm/tools/lld/CMakeLists.txt', 'llvm-project/ollvm-patches/**/*.patch') }}
          restore-keys: |
            ${{ runner.os }}-ollvm-${{ env.LLVM_VERSION }}-
            ${{ runner.os }}-ollvm-

      - name: Configure LLVM/Clang with OLLVM
        run: |
          mkdir -p llvm-project/build
          cd llvm-project/build
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DCLANG_BUILD_TOOLS=ON \
            -DLLVM_ENABLE_EH=OFF \
            -DLLVM_ENABLE_RTTI=OFF \
            -DLLVM_USE_SANITIZER= \
            -DLLVM_ENABLE_PIC=ON \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            ../llvm

      - name: Build OLLVM clang and lld
        run: |
          cd llvm-project/build
          ninja -j "$(nproc)" clang lld

      - name: Download Android NDK ${{ env.NDK_VERSION }} (LTS)
        run: |
          curl -L -o android-ndk-${{ env.NDK_VERSION }}-linux.zip https://dl.google.com/android/repository/android-ndk-${{ env.NDK_VERSION }}-linux.zip
          unzip -q android-ndk-${{ env.NDK_VERSION }}-linux.zip -d ndk

      - name: Replace NDK clang binaries with DreamSoule OLLVM
        run: |
          install_dir=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          build_bin=llvm-project/build/bin
          
          # Create backup of original binaries
          mkdir -p "$install_dir/backup"
          cp -f "$install_dir/clang" "$install_dir/backup/clang.original" 2>/dev/null || true
          cp -f "$install_dir/clang++" "$install_dir/backup/clang++.original" 2>/dev/null || true
          
          # Install OLLVM binaries
          cp -f "$build_bin/clang" "$build_bin/clang++" "$install_dir/"
          
          # Copy lld to NDK
          cp -f "$build_bin/lld" "$install_dir/"
          cp -f "$build_bin/ld.lld" "$install_dir/" 2>/dev/null || ln -sf lld "$install_dir/ld.lld"
          
          # Create versioned symlinks for compatibility (NDK r26 uses clang 17)
          cd "$install_dir"
          for version in 17; do
            if [ -f "clang-$version" ] || [ -L "clang-$version" ]; then
              rm -f "clang-$version"
            fi
            ln -sf clang "clang-$version"
            
            if [ -f "clang++-$version" ] || [ -L "clang++-$version" ]; then
              rm -f "clang++-$version"
            fi
            ln -sf clang++ "clang++-$version"
          done
          
          # Create NDK r26 specific symlinks
          ln -sf clang "clang-17" 2>/dev/null || true
          ln -sf clang++ "clang++-17" 2>/dev/null || true

      - name: Verify ALL DreamSoule OLLVM obfuscation passes
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     DreamSoule OLLVM17 - All Obfuscation Passes Test Suite    ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Create test source
          cat > test_source.c << 'EOF'
          #include <stdio.h>
          #include <string.h>
          
          int main(int argc, char** argv) {
              const char* secret = "Hello OLLVM World";
              char buffer[100];
              strcpy(buffer, secret);
              printf("%s\n", buffer);
              
              int sum = 0;
              for(int i = 0; i < 100; i++) {
                  sum += i;
                  if (sum > 1000) break;
              }
              return sum;
          }
          EOF
          
          # Function to test OLLVM passes
          test_pass() {
              local pass_name=$1
              local pass_flag=$2
              local extra_flags=$3
              
              echo "─────────────────────────────────────────────────────────────────"
              echo "🧪 Testing: $pass_name"
              echo "   Flag: $pass_flag"
              
              if [ -n "$extra_flags" ]; then
                  echo "   Extra: $extra_flags"
                  output=$("$ndk_bin/clang" $pass_flag $extra_flags test_source.c -o test_${pass_name// /_} 2>&1)
              else
                  output=$("$ndk_bin/clang" $pass_flag test_source.c -o test_${pass_name// /_} 2>&1)
              fi
              
              if [ $? -eq 0 ]; then
                  echo "   ✅ $pass_name: SUCCESS"
              else
                  echo "   ⚠️ $pass_name: May require additional flags"
                  echo "   Output: $output"
              fi
              echo ""
          }
          
          # Test ALL OLLVM passes
          test_pass "Control Flow Flattening" "-mllvm -fla"
          test_pass "Bogus Control Flow" "-mllvm -bcf"
          test_pass "Bogus Control Flow with Loop" "-mllvm -bcf" "-mllvm -bcf_loop=3"
          test_pass "Bogus Control Flow with Probability" "-mllvm -bcf" "-mllvm -bcf_prob=40"
          test_pass "Instruction Substitution" "-mllvm -sub"
          test_pass "Instruction Substitution with Loop" "-mllvm -sub" "-mllvm -sub_loop=3"
          test_pass "String Obfuscation" "-mllvm -sobf"
          test_pass "Basic Block Splitting" "-mllvm -split"
          test_pass "Basic Block Splitting with Num" "-mllvm -split" "-mllvm -split_num=3"
          test_pass "Indirect Branch" "-mllvm -ibr"
          test_pass "Indirect Call" "-mllvm -icall"
          test_pass "Indirect Global Variables" "-mllvm -igv"
          
          # Test multiple passes combined
          echo "─────────────────────────────────────────────────────────────────"
          echo "🧪 Testing: Combined Obfuscation Passes"
          echo "   Flags: -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf"
          "$ndk_bin/clang" -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf test_source.c -o test_combined 2>&1
          if [ $? -eq 0 ]; then
              echo "   ✅ Combined passes: SUCCESS"
          else
              echo "   ⚠️ Combined passes may need adjustment"
          fi
          echo ""
          
          # Test with target triple (Android compatibility)
          echo "─────────────────────────────────────────────────────────────────"
          echo "🧪 Testing: Android Target Triple Compatibility"
          echo "   Target: aarch64-linux-android"
          "$ndk_bin/clang" -target aarch64-linux-android -mllvm -fla -mllvm -bcf test_source.c -o test_android 2>&1
          if [ $? -eq 0 ]; then
              echo "   ✅ Android target: SUCCESS"
          else
              echo "   ⚠️ Android target test issue"
          fi
          echo ""
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║              All OLLVM Passes Test Completed                  ║"
          echo "╚════════════════════════════════════════════════════════════════╝"

      - name: Verify Android Studio / CMake / ndk-build compatibility
        run: |
          ndk_bin=ndk/android-ndk-${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin
          
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║        Compatibility Test Suite                               ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Test Android Studio compatibility (target triples)
          echo "✅ Testing Android Studio target triples:"
          for target in aarch64-linux-android armv7a-linux-androideabi i686-linux-android x86_64-linux-android; do
            echo "  🎯 Testing target: $target"
            "$ndk_bin/clang" -target $target -mllvm -fla --version > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "    ✅ $target supported"
            else
              echo "    ⚠️ $target issue"
            fi
          done
          echo ""
          
          # Test CMake compatibility
          echo "✅ Testing CMake compatibility:"
          mkdir -p cmake_test
          cat > cmake_test/CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.22)
          project(test_ollvm C CXX)
          
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -mllvm -fla -mllvm -bcf")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -mllvm -fla -mllvm -bcf")
          
          add_executable(test test.cpp)
          EOF
          
          cat > cmake_test/test.cpp << 'EOF'
          int main() {
              const char* str = "OLLVM CMake Test";
              int sum = 0;
              for(int i = 0; i < 10; i++) sum += i;
              return sum;
          }
          EOF
          
          cd cmake_test
          if command -v cmake &> /dev/null; then
            cmake -DCMAKE_CXX_COMPILER="$ndk_bin/clang++" -DCMAKE_C_COMPILER="$ndk_bin/clang" . && echo "  ✅ CMake configuration successful"
          else
            echo "  ℹ️ CMake not installed - skipping"
          fi
          cd ..
          
          # Test ndk-build compatibility
          echo ""
          echo "✅ Testing ndk-build compatibility:"
          mkdir -p ndk_test/jni
          cat > ndk_test/jni/Android.mk << 'EOF'
          LOCAL_PATH := $(call my-dir)
          
          include $(CLEAR_VARS)
          LOCAL_MODULE := test
          LOCAL_SRC_FILES := test.c
          LOCAL_CFLAGS += -mllvm -fla -mllvm -bcf -mllvm -sobf
          include $(BUILD_EXECUTABLE)
          EOF
          
          cat > ndk_test/jni/test.c << 'EOF'
          #include <stdio.h>
          int main() {
              const char* msg = "ndk-build OLLVM Test";
              printf("%s\n", msg);
              return 0;
          }
          EOF
          
          cat > ndk_test/jni/Application.mk << 'EOF'
          APP_ABI := all
          APP_PLATFORM := android-21
          EOF
          
          cd ndk_test
          if [ -f "../ndk/android-ndk-${{ env.NDK_VERSION }}/ndk-build" ]; then
            ../ndk/android-ndk-${{ env.NDK_VERSION }}/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk 2>&1 | head -30
            echo "  ✅ ndk-build test completed"
          else
            echo "  ℹ️ ndk-build not found - skipping"
          fi
          cd ..

      - name: Print OLLVM compiler version and all available passes
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║     DreamSoule OLLVM17 - Build Information                    ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📌 COMPILER VERSION:"
          echo "─────────────────────────────────────────────────────────────────"
          llvm-project/build/bin/clang --version
          echo ""
          echo "📌 OBFUSCATION PASSES (DreamSoule OLLVM17):"
          echo "─────────────────────────────────────────────────────────────────"
          echo "  ✅ -fla           : Control Flow Flattening"
          echo "  ✅ -bcf           : Bogus Control Flow"
          echo "  ✅ -bcf_loop=N    : Bogus CF Loop (N=number of loops)"
          echo "  ✅ -bcf_prob=N    : Bogus CF Probability (N=percentage)"
          echo "  ✅ -sub           : Instruction Substitution"
          echo "  ✅ -sub_loop=N    : Substitution Loop (N=number of loops)"
          echo "  ✅ -sobf          : String Obfuscation"
          echo "  ✅ -split         : Basic Block Splitting"
          echo "  ✅ -split_num=N   : Split Number (N=number of blocks)"
          echo "  ✅ -ibr           : Indirect Branch"
          echo "  ✅ -icall         : Indirect Call"
          echo "  ✅ -igv           : Indirect Global Variables"
          echo ""
          echo "📌 USAGE EXAMPLES:"
          echo "─────────────────────────────────────────────────────────────────"
          echo "  # Single pass:"
          echo "  clang -mllvm -fla source.c -o output"
          echo ""
          echo "  # Multiple passes:"
          echo "  clang -mllvm -fla -mllvm -bcf -mllvm -sub source.c -o output"
          echo ""
          echo "  # With parameters:"
          echo "  clang -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=40 source.c -o output"
          echo ""
          echo "  # All obfuscations:"
          echo "  clang -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf -mllvm -split source.c -o output"
          echo ""
          echo "📌 NDK INFORMATION:"
          echo "─────────────────────────────────────────────────────────────────"
          echo "  NDK Version    : ${{ env.NDK_VERSION }} (LTS)"
          echo "  LLVM Version   : ${{ env.LLVM_VERSION }} with DreamSoule OLLVM17"
          echo "  Architectures  : AArch64, ARM, X86"
          echo "  Repository     : https://github.com/DreamSoule/ollvm17"
          echo ""

      - name: Create NDK directory structure for Windows compatibility
        run: |
          ndk_dir=ndk/android-ndk-${{ env.NDK_VERSION }}
          
          # Ensure Windows executables are included if needed
          if [ ! -d "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64" ]; then
            echo "Creating Windows-compatible NDK structure..."
            mkdir -p "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64/bin"
            echo "NDK ${{ env.NDK_VERSION }} with DreamSoule OLLVM17 - Windows compatibility" > "$ndk_dir/toolchains/llvm/prebuilt/windows-x86_64/README.md"
          fi
          
          # Create detailed version info
          cat > "$ndk_dir/VERSION.txt" << 'EOF'
          ╔══════════════════════════════════════════════════════════════════╗
          ║     Android NDK with DreamSoule OLLVM17                         ║
          ╚══════════════════════════════════════════════════════════════════╝
          
          NDK Version: r26d (LTS)
          LLVM Version: 17.0.0
          OLLVM Source: https://github.com/DreamSoule/ollvm17
          
          ────────────────────────────────────────────────────────────────────
          OBFUSCATION PASSES:
          ────────────────────────────────────────────────────────────────────
          
          ✓ Control Flow Flattening    : -mllvm -fla
          ✓ Bogus Control Flow         : -mllvm -bcf
            - bcf_loop=N               : Number of loops (default: 1)
            - bcf_prob=N               : Probability percentage (default: 30)
          ✓ Instruction Substitution   : -mllvm -sub
            - sub_loop=N               : Number of loops (default: 1)
          ✓ String Obfuscation         : -mllvm -sobf
          ✓ Basic Block Splitting      : -mllvm -split
            - split_num=N              : Number of blocks (default: 2)
          ✓ Indirect Branch            : -mllvm -ibr
          ✓ Indirect Call              : -mllvm -icall
          ✓ Indirect Global Variables  : -mllvm -igv
          
          ────────────────────────────────────────────────────────────────────
          USAGE EXAMPLES:
          ────────────────────────────────────────────────────────────────────
          
          # Control Flow Flattening only:
          clang -mllvm -fla source.c -o output
          
          # Multiple passes:
          clang -mllvm -fla -mllvm -bcf -mllvm -sub source.c -o output
          
          # With parameters:
          clang -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=40 source.c -o output
          
          # All obfuscations:
          clang -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf -mllvm -split source.c -o output
          
          # Android target:
          clang -target aarch64-linux-android -mllvm -fla -mllvm -bcf source.c -o output
          
          ────────────────────────────────────────────────────────────────────
          INTEGRATION:
          ────────────────────────────────────────────────────────────────────
          
          CMake:
            set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -mllvm -fla -mllvm -bcf")
          
          Android Studio (build.gradle):
            cppFlags "-mllvm -fla -mllvm -bcf"
          
          ndk-build (Android.mk):
            LOCAL_CFLAGS += -mllvm -fla -mllvm -bcf
          
          ╔══════════════════════════════════════════════════════════════════╗
          ║  For more info: https://github.com/DreamSoule/ollvm17          ║
          ╚══════════════════════════════════════════════════════════════════╝
          EOF

      - name: Package modified Android NDK with DreamSoule OLLVM
        run: |
          cd ndk
          zip -r ../android-ndk-${{ env.NDK_VERSION }}-ollvm.zip android-ndk-${{ env.NDK_VERSION }} \
            -x "*/backup/*" \
            -x "*/test_*" \
            -x "*/cmake_test/*" \
            -x "*/ndk_test/*" \
            -x "*/linux-x86_64/libexec/*" \
            -x "*/linux-x86_64/share/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-ndk-${{ env.NDK_VERSION }}-ollvm
          path: android-ndk-${{ env.NDK_VERSION }}-ollvm.zip
          retention-days: 30

      - name: Generate comprehensive build summary
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗" >> $GITHUB_STEP_SUMMARY
          echo "║  ✅ DreamSoule OLLVM17 Build Complete                        ║" >> $GITHUB_STEP_SUMMARY
          echo "╚════════════════════════════════════════════════════════════════╝" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📦 Package Details" >> $GITHUB_STEP_SUMMARY
          echo "- **NDK Version:** ${{ env.NDK_VERSION }} (LTS)" >> $GITHUB_STEP_SUMMARY
          echo "- **LLVM Version:** ${{ env.LLVM_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **OLLVM Source:** [DreamSoule/ollvm17](https://github.com/DreamSoule/ollvm17) ⭐⭐⭐⭐⭐" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** \`android-ndk-${{ env.NDK_VERSION }}-ollvm.zip\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 🛡️ All Obfuscation Passes" >> $GITHUB_STEP_SUMMARY
          echo "| Pass | Description | Flag | Parameters |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Control Flow Flattening** | Flattens control flow graph | \`-mllvm -fla\` | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bogus Control Flow** | Adds fake control flow paths | \`-mllvm -bcf\` | \`-bcf_loop=N\`, \`-bcf_prob=N\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Instruction Substitution** | Replaces instructions with equivalents | \`-mllvm -sub\` | \`-sub_loop=N\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **String Obfuscation** | Encrypts strings in binary | \`-mllvm -sobf\` | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **Basic Block Splitting** | Splits basic blocks | \`-mllvm -split\` | \`-split_num=N\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Branch** | Obfuscates branch targets | \`-mllvm -ibr\` | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Call** | Obfuscates call targets | \`-mllvm -icall\` | - |" >> $GITHUB_STEP_SUMMARY
          echo "| **Indirect Global Variables** | Obfuscates global variable access | \`-mllvm -igv\` | - |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## ✅ Compatibility" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Android Studio (all target triples)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ CMake (3.22+)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ ndk-build (Android.mk/Application.mk)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Windows (cross-platform support)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📝 Usage Examples" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo '# Single pass' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -fla source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Multiple passes' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -fla -mllvm -bcf -mllvm -sub source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# With parameters' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=40 source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# All obfuscations' >> $GITHUB_STEP_SUMMARY
          echo 'clang -mllvm -fla -mllvm -bcf -mllvm -sub -mllvm -sobf -mllvm -split source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '# Android target' >> $GITHUB_STEP_SUMMARY
          echo 'clang -target aarch64-linux-android -mllvm -fla -mllvm -bcf source.c -o output' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 🔧 Integration" >> $GITHUB_STEP_SUMMARY
          echo "### CMake" >> $GITHUB_STEP_SUMMARY
          echo '```cmake' >> $GITHUB_STEP_SUMMARY
          echo 'set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -mllvm -fla -mllvm -bcf -mllvm -sub")' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android Studio (build.gradle)" >> $GITHUB_STEP_SUMMARY
          echo '```gradle' >> $GITHUB_STEP_SUMMARY
          echo 'android {' >> $GITHUB_STEP_SUMMARY
          echo '    defaultConfig {' >> $GITHUB_STEP_SUMMARY
          echo '        externalNativeBuild {' >> $GITHUB_STEP_SUMMARY
          echo '            cmake {' >> $GITHUB_STEP_SUMMARY
          echo '                cppFlags "-mllvm -fla -mllvm -bcf -mllvm -sub"' >> $GITHUB_STEP_SUMMARY
          echo '            }' >> $GITHUB_STEP_SUMMARY
          echo '        }' >> $GITHUB_STEP_SUMMARY
          echo '    }' >> $GITHUB_STEP_SUMMARY
          echo '}' >> $GITHUB_STEP_SUMMARY
